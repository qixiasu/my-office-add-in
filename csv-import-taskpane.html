<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>导入 CSV 文件</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/><link href="1fda685b81e1123773f6.css" rel="stylesheet"/><link href="544d02657f3bc0966510.css" rel="stylesheet"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="csv-import-taskpane.js"></script></head><body class="ms-font-m ms-welcome ms-Fabric"><div class="csv-import-container"><div class="taskpane-header"><svg width="20" height="20" viewBox="0 0 20 20" fill="#0078d4"><path d="M14 3a1 1 0 0 1 1 1v5.586l2.707 2.707A1 1 0 0 1 17 14.414V15a1 1 0 0 1-2 0v-1a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v1a1 1 0 0 1-2 0v-.586a1 1 0 0 1 .293-.707L11 9.586V4a1 1 0 0 1 1-1h2z"/></svg><h1>导入 CSV 文件</h1></div><div class="stepper"><div class="step active" id="step1"><div class="step-circle">1</div><div class="step-label">选择文件</div></div><div class="step" id="step2"><div class="step-circle">2</div><div class="step-label">设置分隔符</div></div><div class="step" id="step3"><div class="step-circle">3</div><div class="step-label">确认导入</div></div></div><div class="step-content"><div id="panel1" class="step-panel"><div class="guide-card"><p>选择 CSV/TXT 文件，支持逗号/制表符分隔的数据文件</p></div><div class="form-group"><label for="fileInput">选择文件：</label> <input type="file" id="fileInput" accept=".csv,.tsv,.txt"/><div id="fileName" class="file-name"></div></div><div class="form-group"><label for="encodingSelect">文件编码：</label> <select id="encodingSelect"><option value="utf-8" selected="selected">UTF-8</option><option value="gbk">GBK / GB2312（简体中文）</option><option value="gb18030">GB18030</option><option value="big5">Big5（繁体中文）</option></select></div></div><div id="panel2" class="step-panel" style="display:none"><div class="guide-card"><p>设置分隔符，默认为逗号（,），支持任意单字符</p></div><div class="form-group"><label for="delimiterInput">分隔符：</label> <input id="delimiterInput" value="," maxlength="1"/></div></div><div id="panel3" class="step-panel" style="display:none"><div class="guide-card"><p id="summaryText"></p></div></div></div><div class="btn-row"><button id="prevBtn" class="concat-button concat-button--secondary" disabled="disabled">上一步</button> <button id="nextBtn" class="concat-button">下一步</button></div><div id="status" class="status-message">状态：等待操作...</div></div></body></html>
