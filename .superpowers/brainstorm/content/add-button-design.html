<h2>添加执行按钮 - 设计方案</h2>
<p class="subtitle">选择按钮样式和交互方式</p>

<div class="options">
  <div class="option" data-choice="primary" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>主按钮（蓝色）</h3>
      <p>使用 Fluent UI 主按钮样式，蓝色背景。保留 Enter 键触发作为键盘快捷方式。</p>
    </div>
  </div>

  <div class="option" data-choice="secondary" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>次要按钮（轮廓）</h3>
      <p>使用轮廓按钮样式，蓝色边框。保留 Enter 键触发。</p>
    </div>
  </div>

  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>纯文字按钮</h3>
      <p>最简化的文字链接样式。适合追求简洁的场景。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 24px;">
  <h3>按钮位置预览</h3>
  <div class="mockup">
    <div style="padding: 20px; background: #f5f5f5;">
      <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.12);">
        <div style="font-size: 16px; font-weight: 700; color: #0078d4; margin-bottom: 16px;">🔗 连接列工具</div>

        <div style="background: #f0f7ff; border-left: 3px solid #0078d4; padding: 12px; border-radius: 4px; margin-bottom: 16px;">
          <div style="font-size: 13px; color: #005a9e;">1. 选中 Excel 中要连接的两列<br>2. 输入连接符，点击执行</div>
        </div>

        <div style="margin-bottom: 12px;">
          <label style="font-size: 13px; color: #666; margin-bottom: 6px; display: block;">连接符</label>
          <input type="text" value="_" style="width: 100%; padding: 10px 12px; border: 2px solid #0078d4; border-radius: 6px; font-size: 15px; box-sizing: border-box;">
        </div>

        <button style="width: 100%; padding: 10px 16px; background: #0078d4; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;">
          执行连接
        </button>

        <div style="margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 13px; background: #f5f5f5;">
          状态：等待操作...
        </div>
      </div>
    </div>
  </div>
</div>
