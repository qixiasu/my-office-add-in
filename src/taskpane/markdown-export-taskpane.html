<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' https://localhost:* https://appsforoffice.microsoft.com;"
    />
    <title>导出 Markdown</title>

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- Office UI Fabric CSS -->
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />

    <!-- Template styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
    <link href="markdown-export-taskpane.css" rel="stylesheet" type="text/css" />
  </head>
  <body class="ms-font-m ms-welcome ms-Fabric">
    <div class="markdown-export-container">
      <!-- Title with SVG icon -->
      <h1 class="md-title">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="#0078d4">
          <path d="M3 3h14v2H3V3zm0 4h14v2H3V7zm0 4h8v2H3v-2zm10 4h4v2h-4v-2z" />
        </svg>
        导出 Markdown 表格
      </h1>

      <!-- Guide card -->
      <div class="guide-card">
        <p>选择 Excel 中的数据区域，点击"生成预览"查看 Markdown 格式效果，然后复制到剪贴板</p>
      </div>

      <!-- Warning box (hidden by default) -->
      <div id="warningBox" class="warning-box" style="display: none">
        <svg class="warning-icon" width="16" height="16" viewBox="0 0 20 20" fill="#856404">
          <path
            d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 4a1 1 0 0 1 1 1v4a1 1 0 0 1-2 0V7a1 1 0 0 1 1-1zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"
          />
        </svg>
        <span id="warningText"></span>
      </div>

      <!-- Action buttons row -->
      <div class="md-btn-row">
        <button type="button" id="refreshBtn" class="md-button">刷新选择</button>
        <button type="button" id="generateBtn" class="md-button md-button--primary">
          生成 Markdown
        </button>
      </div>

      <!-- Preview section -->
      <div class="preview-section">
        <div class="preview-header">
          <span>预览</span>
          <span id="previewInfo" class="preview-info"></span>
        </div>
        <pre id="markdownPreview" class="md-preview"></pre>
      </div>

      <!-- Copy button -->
      <button type="button" id="copyBtn" class="md-button md-button--copy" disabled>
        复制到剪贴板
      </button>

      <!-- Toast notification -->
      <div id="toast" class="md-toast" role="status" aria-live="polite">已复制到剪贴板</div>
    </div>
  </body>
</html>
