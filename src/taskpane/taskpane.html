<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>连接列工具</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <!-- Template styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <header class="ms-welcome__header ms-bgColor-neutralLighter">
        <h1 class="ms-font-su">连接列工具</h1>
    </header>
    <main id="app-body" class="ms-welcome__main">
        <h2 class="ms-font-l">导入 UTF-8 文本文件</h2>
        <p class="ms-font-m">直接打开中文 CSV/TSV 会乱码？用此功能正确导入</p>
        <div style="margin: 20px 0;">
            <label for="csvDelimiter" class="ms-font-m">自定义分隔符（可选）：</label><br/>
            <input type="text" id="csvDelimiter" value="," style="width: 60px; height: 30px; font-size: 16px; margin-top: 8px;"/>
        </div>
        <input type="file" id="csvFileInput" accept=".csv,.tsv,.txt" style="display:none;" />
        <div role="button" id="importCsvBtn" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
            <span class="ms-Button-label">导入CSV</span>
        </div>
        <p id="importStatus" style="margin-top: 20px; color: green;"></p>
        <hr style="width:100%; margin: 30px 0;" />
        <h2 class="ms-font-l">增强查找</h2>
        <p class="ms-font-m">一次完成多列查找，匹配列可在任意位置，返回列可自由选择，查找不到时自动填充默认值</p>
        <div role="button" id="vlookupBtn" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
            <span class="ms-Button-label">增强查找</span>
        </div>
        <p id="vlookupStatus" style="margin-top: 20px; color: green;"></p>
    </main>
</body>

</html>
