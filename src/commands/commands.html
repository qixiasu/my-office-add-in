<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Register function commands immediately after office.js loads, before polyfills -->
    <script type="text/javascript">
        // Signal that the function file is ready to initialize
        Office.onReady(function (info) {
            // Office.js is ready
        });

        // Inline utility functions (self-contained, no module dependencies)
        function getColumnLetter(colIndex) {
            var letter = "";
            var remaining = colIndex;
            do {
                letter = String.fromCharCode(65 + (remaining % 26)) + letter;
                remaining = Math.floor(remaining / 26) - 1;
            } while (remaining >= 0);
            return letter;
        }

        function escapeFormulaText(text) {
            return text.replace(/"/g, '""');
        }

        function getColNum(id) {
            var num = 0;
            for (var i = 0; i < id.length; i++) {
                var ch = id.charCodeAt(i);
                if (ch >= 65 && ch <= 90) {
                    num = num * 26 + (ch - 65);
                } else {
                    break;
                }
            }
            return num;
        }

        function getRowNum(id) {
            return parseInt(id.replace(/[^0-9]/g, ""), 10) || 1;
        }

        function buildConcatFormula(firstColLetter, secondColLetter, connector) {
            var escaped = escapeFormulaText(connector);
            return "=IF(" + firstColLetter + "1&" + secondColLetter + '1="","",' +
                firstColLetter + '1&"' + escaped + '"&' + secondColLetter + "1)";
        }

        var MAX_ROWS = 1050000;

        // Core concat logic, extracted so it can be called with a user-provided connector
        function performConcat(event, connector) {
            Excel.run(function (context) {
                var range = context.workbook.getSelectedRange();
                range.load(["address", "columnCount", "columnIndex"]);
                return context.sync().then(function () {
                    if (range.columnCount < 2) {
                        Office.context.ui.messageBox("请至少选择两列");
                        throw new Error("cancel");
                    }

                    var worksheet = context.workbook.worksheets.getActiveWorksheet();
                    var colIndex = range.columnIndex;
                    var firstColLetter = getColumnLetter(colIndex);
                    var secondColLetter = getColumnLetter(colIndex + 1);

                    var usedInSelection = range.getUsedRange();
                    usedInSelection.load("rowCount");
                    return context.sync().then(function () {
                        var rowCount = usedInSelection.rowCount;

                        if (rowCount === 0) {
                            Office.context.ui.messageBox("没有数据");
                            throw new Error("cancel");
                        }

                        if (rowCount > MAX_ROWS) {
                            Office.context.ui.messageBox(
                                "数据量过大（" + rowCount + " 行），单次最多支持 " + MAX_ROWS + " 行。"
                            );
                            throw new Error("cancel");
                        }

                        var targetColLetter = getColumnLetter(colIndex + 2);
                        worksheet
                            .getRange(targetColLetter + ":" + targetColLetter)
                            .insert(Excel.InsertShiftDirection.right);
                        return context.sync().then(function () {
                            var formula = buildConcatFormula(firstColLetter, secondColLetter, connector);

                            var startCell = worksheet.getRange(targetColLetter + "1");
                            startCell.formulas = [[formula]];
                            return context.sync().then(function () {
                                if (rowCount > 1) {
                                    var fillRange = worksheet.getRange(
                                        targetColLetter + "1:" + targetColLetter + rowCount
                                    );
                                    startCell.autoFill(fillRange, Excel.AutoFillType.fillDefault);
                                    return context.sync();
                                }
                            }).then(function () {
                                Office.context.ui.messageBox(
                                    "完成! 已在第 " + targetColLetter + " 列写入 " + rowCount + " 行公式"
                                );
                            });
                        });
                    });
                });
            }).then(function () {
                event.completed();
            }).catch(function (error) {
                if (error.message !== "cancel") {
                    Office.context.ui.messageBox("操作失败: " + error.message);
                }
                event.completed();
            });
        }

        Office.actions.associate("concatenateColumns", function concatenateColumns(event) {
            var dialogUrl = window.location.origin + "/connector-dialog.html";
            Office.context.ui.displayDialogAsync(
                dialogUrl,
                { height: 30, width: 20, displayInIframe: true },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        // Dialog failed, fallback to default connector
                        performConcat(event, "_");
                        return;
                    }
                    var dialog = asyncResult.value;
                    dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                        dialog.close();
                        var connector = arg.message || "_";
                        performConcat(event, connector);
                    });
                    dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                        // Dialog closed without input, cancel operation
                        event.completed();
                    });
                }
            );
        });

        Office.actions.associate("importCSV", function importCSV(event) {
            var dialogUrl = window.location.origin + "/csv-import-dialog.html";
            Office.context.ui.displayDialogAsync(
                dialogUrl,
                { height: 50, width: 30, displayInIframe: true },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        Office.context.ui.messageBox("无法打开导入对话框");
                        event.completed();
                        return;
                    }
                    var dialog = asyncResult.value;
                    dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                        dialog.close();
                        var msg;
                        try {
                            msg = JSON.parse(arg.message);
                        } catch (e) {
                            Office.context.ui.messageBox("数据解析失败");
                            event.completed();
                            return;
                        }
                        if (msg.type !== "import" || !msg.rows || !msg.rows.length) {
                            event.completed();
                            return;
                        }
                        Excel.run(function (context) {
                            var sheet = context.workbook.worksheets.getActiveWorksheet();
                            var startRange = context.workbook.getSelectedRange();
                            startRange.load("address");
                            return context.sync().then(function () {
                                var addr = startRange.address.split("!").pop();
                                var startCol = getColNum(addr);
                                var startRow = getRowNum(addr);
                                var colCount = msg.rows[0].length;
                                var rowCount = msg.rows.length;
                                var endCol = startCol + colCount - 1;
                                var endRow = startRow + rowCount - 1;

                                var targetRange = sheet.getRange(
                                    getColumnLetter(startCol) + startRow + ":" +
                                    getColumnLetter(endCol) + endRow
                                );
                                targetRange.values = msg.rows;
                                return context.sync().then(function () {
                                    Office.context.ui.messageBox(
                                        "导入完成! " + msg.filename + " → " + rowCount + " 行 × " + colCount + " 列"
                                    );
                                });
                            });
                        }).catch(function (error) {
                            Office.context.ui.messageBox("导入失败: " + error.message);
                        }).then(function () {
                            event.completed();
                        });
                    });
                    dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                        event.completed();
                    });
                }
            );
        });

        Office.actions.associate("enhancedVlookup", function enhancedVlookup(event) {
            // Get selected range address BEFORE opening dialog (dialog runs in Commands host, not main Excel window)
            Excel.run(function (context) {
                var selectedRange = context.workbook.getSelectedRange();
                selectedRange.load("address");
                return context.sync().then(function () {
                    var preselectedAddress = selectedRange.address || "";
                    var dialogUrl = window.location.origin + "/vlookup-dialog.html";
                    if (preselectedAddress) {
                        dialogUrl += "?preselected=" + encodeURIComponent(preselectedAddress);
                    }
                    openVlookupDialog(dialogUrl, event);
                });
            }).catch(function () {
                // Fallback: open dialog without preselected range
                openVlookupDialog(window.location.origin + "/vlookup-dialog.html", event);
            });

            function openVlookupDialog(dialogUrl, ev) {
                Office.context.ui.displayDialogAsync(
                    dialogUrl,
                    { height: 60, width: 35, displayInIframe: true },
                    function (asyncResult) {
                        if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                            Office.context.ui.messageBox("无法打开增强查找对话框");
                            ev.completed();
                            return;
                        }
                        var dialog = asyncResult.value;

                        dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                            var msg;
                            try {
                                msg = JSON.parse(arg.message);
                            } catch (e) {
                                ev.completed();
                                return;
                            }

                            // Handle non-vlookup messages without closing dialog
                            if (msg.type !== "vlookup") {
                                if (msg.type === "refreshSelection") {
                                    // Close current dialog, get selection, re-open with preserved state
                                    dialog.close();
                                    var savedState = msg.state || {};
                                    Excel.run(function (context) {
                                        var sel = context.workbook.getSelectedRange();
                                        sel.load(["address", "rowCount"]);
                                        return context.sync().then(function () {
                                            var newAddr = sel.address || "";
                                            // If selecting a whole column (e.g. "I:I"), convert to actual data range
                                            if (/^[A-Z]+:?[A-Z]+$/i.test(newAddr) && newAddr.indexOf(":") !== -1) {
                                                var colParts = newAddr.split(":");
                                                if (colParts[0] === colParts[1]) {
                                                    // Whole column selected, get actual used range
                                                    var ws = context.workbook.worksheets.getActiveWorksheet();
                                                    var usedRange = ws.getUsedRange();
                                                    usedRange.load(["rowCount", "rowIndex"]);
                                                    return context.sync().then(function () {
                                                        var actualRowCount = usedRange.rowCount;
                                                        var actualStartRow = usedRange.rowIndex + 1;  // 1-based
                                                        var colLetter = colParts[0].replace(/\$/gi, "").match(/[A-Z]+/i)[0];
                                                        newAddr = "Sheet1!" + colLetter + actualStartRow + ":" + colLetter + (actualStartRow + actualRowCount - 1);
                                                        return afterResolve(newAddr);
                                                    });
                                                }
                                            }
                                            return afterResolve(newAddr);
                                            function afterResolve(addr) {
                                                var reopenUrl = window.location.origin + "/vlookup-dialog.html";
                                                if (msg.target === "lookupValue") {
                                                    reopenUrl += "?lookupValue=" + encodeURIComponent(addr);
                                                    if (savedState.lookupTable) { reopenUrl += "&lookupTable=" + encodeURIComponent(savedState.lookupTable); }
                                                } else {
                                                    reopenUrl += "?lookupTable=" + encodeURIComponent(addr);
                                                    if (savedState.lookupValue) { reopenUrl += "&lookupValue=" + encodeURIComponent(savedState.lookupValue); }
                                                }
                                                if (savedState.headerRow) { reopenUrl += "&headerRow=" + encodeURIComponent(savedState.headerRow); }
                                                if (savedState.matchCol !== undefined) { reopenUrl += "&matchCol=" + encodeURIComponent(savedState.matchCol); }
                                                if (savedState.returnCols) { reopenUrl += "&returnCols=" + encodeURIComponent(savedState.returnCols); }
                                                if (savedState.matchMode !== undefined) { reopenUrl += "&matchMode=" + encodeURIComponent(savedState.matchMode); }
                                                if (savedState.outputType) { reopenUrl += "&outputType=" + encodeURIComponent(savedState.outputType); }
                                                openVlookupDialog(reopenUrl, ev);
                                            }
                                        });
                                    }).catch(function (err) {
                                        Office.context.ui.messageBox("获取选区失败: " + (err.message || "未知错误"));
                                        ev.completed();
                                    });
                                }
                                return;
                            }

                            dialog.close();
                            performEnhancedVlookup(ev, msg);
                        });
                        dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                            ev.completed();
                        });
                    }
                );
            }
        });

        function performEnhancedVlookup(event, config) {
            Excel.run(function (context) {
                return resolveDataRange(context, config).then(function (dataRange) {
                    if (dataRange.rowCount === 0) {
                        Office.context.ui.messageBox("没有数据");
                        throw new Error("cancel");
                    }

                    if (dataRange.rowCount > MAX_ROWS) {
                        Office.context.ui.messageBox(
                            "数据量过大（" + dataRange.rowCount + " 行），单次最多支持 " + MAX_ROWS + " 行。"
                        );
                        throw new Error("cancel");
                    }

                    var worksheet = context.workbook.worksheets.getActiveWorksheet();

                    // Parse lookupValue to find the actual lookup value column and row
                    var lookupValueStr = config.lookupValue || "";
                    var lvParsed = parseRangeAddressInline(lookupValueStr);
                    var dataStartCol = lvParsed.startCol;  // 0-based column index
                    var dataStartRow = lvParsed.startRow;   // 1-based row number from address
                    var dataStartRow1 = dataStartRow;        // 1-based for cell addresses (startRow is already 1-based)
                    var dataRowCount = dataRange.rowCount;    // Use actual selected range row count
                    var dataColLetter = getColumnLetter(dataStartCol);

                    var lookupColRange = buildColRangeInline(config.parsed, config.matchColIndex);
                    var returnColRanges = [];
                    for (var i = 0; i < config.returnColIndices.length; i++) {
                        returnColRanges.push(buildColRangeInline(config.parsed, config.returnColIndices[i]));
                    }

                    if (config.outputType === "formula") {
                        var returnColCount = config.returnColIndices.length;
                        var insertPos = dataStartCol + 1;  // Insert immediately after the lookup value column
                        var headerRow = config.headerRow || 1;

                        // Get lookup sheet reference for reading headers
                        var lookupSheet;
                        if (config.parsed.sheet) {
                            lookupSheet = context.workbook.worksheets.getItem(config.parsed.sheet);
                        } else {
                            lookupSheet = context.workbook.worksheets.getActiveWorksheet();
                        }

                        // Insert all columns at once (faster than looping)
                        var insertRangeStr = getColumnLetter(insertPos) + ":" + getColumnLetter(insertPos + returnColCount - 1);
                        worksheet.getRange(insertRangeStr).insert(Excel.InsertShiftDirection.right);

                        return context.sync().then(function () {
                            // Use XLOOKUP for much better performance on large datasets
                            // XLOOKUP scans the lookup array once and returns all results (dynamic array)
                            // Falls back to VLOOKUP for older Excel versions
                            var firstCol = getColumnLetter(config.parsed.startCol);
                            var lastCol = getColumnLetter(config.parsed.endCol);
                            var lookupCol = firstCol + ":" + firstCol;  // Full column ref for lookup column
                            var tableCols = getColumnLetter(config.parsed.startCol) + ":" + lastCol;

                            // Get header values from lookup table
                            var headerRangeAddr = firstCol + headerRow + ":" + lastCol + headerRow;
                            var headerRange = lookupSheet.getRange(headerRangeAddr);
                            headerRange.load("values");
                            return context.sync().then(function () {
                                var headerData = headerRange.values;
                                var headerRowValues = [];
                                for (var hc = 0; hc < returnColCount; hc++) {
                                    headerRowValues.push(headerData[0][config.returnColIndices[hc]]);
                                }

                                // Write header row as static values
                                var headerWriteRange = worksheet.getRange(
                                    getColumnLetter(insertPos) + dataStartRow1 + ":" +
                                    getColumnLetter(insertPos + returnColCount - 1) + dataStartRow1
                                );
                                headerWriteRange.values = [headerRowValues];

                                // Now write formulas starting from dataStartRow1 + headerRow
                                var formulaStartRow = dataStartRow1 + headerRow;
                                var firstRowFormulas = [];
                                var lookupCellRef = dataColLetter + formulaStartRow;
                                for (var col = 0; col < returnColCount; col++) {
                                    var returnCol = getColumnLetter(config.parsed.startCol + config.returnColIndices[col]);
                                    var returnColRef = returnCol + ":" + returnCol;
                                    // XLOOKUP is 10-100x faster than VLOOKUP on large datasets
                                    // Syntax: =XLOOKUP(lookupValue, lookupArray, returnArray, missingValue, matchMode, searchMode)
                                    firstRowFormulas.push("=XLOOKUP(" + lookupCellRef + ", " + lookupCol + ", " + returnColRef + ", \"\", 0, 1)");  // exact match, binary search
                                }

                                // Write only the first row of formulas
                                var firstRowRange = worksheet.getRange(
                                    getColumnLetter(insertPos) + formulaStartRow + ":" +
                                    getColumnLetter(insertPos + returnColCount - 1) + formulaStartRow
                                );
                                firstRowRange.formulas = [firstRowFormulas];

                                return context.sync().then(function () {
                                    // Auto-fill down to cover all rows (fast Excel native operation)
                                    var fillRange = worksheet.getRange(
                                        getColumnLetter(insertPos) + formulaStartRow + ":" +
                                        getColumnLetter(insertPos + returnColCount - 1) + (formulaStartRow + dataRowCount - headerRow - 1)
                                    );
                                    firstRowRange.autoFill(fillRange, Excel.AutoFillType.fillDefault);

                                    return context.sync().then(function () {
                                        Office.context.ui.messageBox(
                                            "完成! 已在 " + returnColCount + " 列写入 " + (dataRowCount - headerRow + 1) + " 行 XLOOKUP 公式（已优化大数据性能）"
                                        );
                                    });
                                });
                            });
                        });
                    } else {
                        // Static mode: JS HashMap lookup
                        var lookupSheet;
                        if (config.parsed.sheet) {
                            lookupSheet = context.workbook.worksheets.getItem(config.parsed.sheet);
                        } else {
                            lookupSheet = context.workbook.worksheets.getActiveWorksheet();
                        }

                        // Get actual used range on the lookup sheet to find real data boundaries
                        var lookupUsedRange = lookupSheet.getUsedRange();
                        lookupUsedRange.load(["rowCount", "columnCount", "rowIndex", "columnIndex"]);
                        var valuesRange = dataRange.getUsedRange();
                        valuesRange.load("values");
                        return context.sync().then(function () {
                            // Build exact range: from usedRange start to end
                            var actualStartRow = lookupUsedRange.rowIndex + 1;  // 1-based
                            var actualRowCount = lookupUsedRange.rowCount;
                            var actualEndRow = actualStartRow + actualRowCount - 1;
                            var firstCol = getColumnLetter(config.parsed.startCol);
                            var lastCol = getColumnLetter(config.parsed.endCol);
                            var exactRangeAddr = firstCol + actualStartRow + ":" + lastCol + actualEndRow;
                            var exactRange = lookupSheet.getRange(exactRangeAddr);
                            exactRange.load("values");
                            return context.sync().then(function () {
                                var lookupData = exactRange.values;
                                var valuesData = valuesRange.values;

                                // Build HashMap for O(1) lookup
                                var lookupMap = {};
                                var matchCol = config.matchColIndex;
                                for (var i = 0; i < lookupData.length; i++) {
                                    var key = lookupData[i][matchCol];
                                    if (key !== null && key !== undefined) {
                                        key = String(key);
                                    } else {
                                        key = "";
                                    }
                                    lookupMap[key] = i;
                                }

                                // Perform lookup
                                var results = [];
                                var returnCols = config.returnColIndices;
                                var headerRow = config.headerRow || 1;
                                var valuesOffset = headerRow;  // Skip header rows in valuesData (headerRow=1 means skip row 0)

                                // Prepend header row(s) from lookup table to results
                                for (var h = 0; h < headerRow; h++) {
                                    var headerResultRow = [];
                                    for (var hc = 0; hc < returnCols.length; hc++) {
                                        headerResultRow.push(lookupData[h][returnCols[hc]]);
                                    }
                                    results.push(headerResultRow);
                                }

                                for (var r = 0; r < valuesData.length; r++) {
                                    // Skip header rows
                                    if (r < valuesOffset) {
                                        continue;
                                    }
                                    var lookupKey = String(valuesData[r][0]);
                                    var matchIdx = lookupMap[lookupKey];
                                    var row = [];
                                    if (matchIdx !== undefined) {
                                        for (var c = 0; c < returnCols.length; c++) {
                                            row.push(lookupData[matchIdx][returnCols[c]]);
                                        }
                                    } else {
                                        for (var c2 = 0; c2 < returnCols.length; c2++) {
                                            row.push("#N/A");
                                        }
                                    }
                                    results.push(row);
                                }

                                // Insert result columns
                                var insertPos2 = dataStartCol + 1;
                                var returnColCount2 = returnCols.length;
                                var insertRangeStr2 = getColumnLetter(insertPos2) + ":" + getColumnLetter(insertPos2 + returnColCount2 - 1);
                                // Start from dataStartRow1 (header from lookup table is prepended to results)
                                var resultStartRow = dataStartRow1;
                                var targetRangeStr = getColumnLetter(insertPos2) + resultStartRow + ":" + getColumnLetter(insertPos2 + returnColCount2 - 1) + (resultStartRow + results.length - 1);
                                worksheet.getRange(insertRangeStr2).insert(Excel.InsertShiftDirection.right);

                                return context.sync().then(function () {
                                    var targetRange = worksheet.getRange(targetRangeStr);
                                    targetRange.values = results;
                                    return context.sync().then(function () {
                                        Office.context.ui.messageBox(
                                            "完成! 已写入 " + results.length + " 行 × " + returnColCount2 + " 列静态值"
                                        );
                                    });
                                });
                            });
                        });
                    }
                });
            }).then(function () {
                event.completed();
            }).catch(function (error) {
                if (error.message !== "cancel") {
                    console.error("操作失败: " + error.message);
                }
                event.completed();
            });
        }

        function parseCellRefInline(ref) {
            var col = 0;
            var i = 0;
            while (i < ref.length) {
                var ch = ref.charCodeAt(i);
                if (ch === 36) { i++; }  // Skip $
                else if (ch >= 65 && ch <= 90) { col = col * 26 + (ch - 64); i++; }
                else if (ch >= 97 && ch <= 122) { col = col * 26 + (ch - 96); i++; }
                else { break; }
            }
            // Skip any remaining $ between column and row
            while (i < ref.length && ref.charCodeAt(i) === 36) { i++; }
            var row = parseInt(ref.substring(i), 10) || 1;
            return { col: col - 1, row: row };
        }

        function parseRangeAddressInline(address) {
            var sheet = "";
            var rangePart = address;
            var bangIdx = address.indexOf("!");
            if (bangIdx !== -1) {
                sheet = address.substring(0, bangIdx);
                rangePart = address.substring(bangIdx + 1);
            }
            var parts = rangePart.split(":");
            var start = parseCellRefInline(parts[0]);
            var end = parseCellRefInline(parts[1] || parts[0]);
            return {
                sheet: sheet,
                startCol: start.col,
                startRow: start.row,
                endCol: end.col,
                endRow: end.row,
                colCount: end.col - start.col + 1,
                rowCount: end.row - start.row + 1
            };
        }

        function resolveDataRange(context, config) {
            // dataRange should always come from config.lookupValue, not from Excel's current selection
            // config.lookupValue specifies which column to use for matching, not how many rows to process
            var lookupValueParsed = parseRangeAddressInline(config.lookupValue);
            var worksheet;
            if (lookupValueParsed.sheet) {
                worksheet = context.workbook.worksheets.getItem(lookupValueParsed.sheet);
            } else {
                worksheet = context.workbook.worksheets.getActiveWorksheet();
            }
            var firstColLetter = getColumnLetter(lookupValueParsed.startCol);
            // Handle full column selection (e.g., C:C -> C1:C1 parsed)
            var rangeAddr = firstColLetter + lookupValueParsed.startRow + ":" + firstColLetter + lookupValueParsed.endRow;
            var range = worksheet.getRange(rangeAddr);
            range.load(["columnCount", "columnIndex", "rowIndex"]);
            return context.sync().then(function () {
                // Check if it's a single-cell range (indicates full column reference was parsed down)
                if (lookupValueParsed.startRow === lookupValueParsed.endRow && lookupValueParsed.startCol === lookupValueParsed.endCol) {
                    // It's likely a full column reference like C:C, use getRange("C:C") then getUsedRange()
                    var entireColumn = worksheet.getRange(firstColLetter + ":" + firstColLetter);
                    var usedRange = entireColumn.getUsedRange();
                    usedRange.load(["rowCount", "columnIndex", "rowIndex"]);
                    return context.sync().then(function () {
                        return usedRange;
                    });
                }
                return range;
            });
        }

        function buildColRangeInline(parsed, colIndex) {
            var colLetter = getColumnLetter(parsed.startCol + colIndex);
            var prefix = parsed.sheet ? parsed.sheet + "!" : "";
            // Use full column reference ($B:$B) to avoid range size issues
            return prefix + "$" + colLetter + ":" + "$" + colLetter;
        }

        function staticLookupInline(lookupValues, lookupTable, matchColIndex, returnColIndices, matchMode) {
            var results = [];
            var index = {};
            if (matchMode === 0) {
                for (var r = 0; r < lookupTable.length; r++) {
                    var key = lookupTable[r][matchColIndex];
                    if (key === null || key === undefined) { key = ""; }
                    key = String(key);
                    index[key] = r;
                }
            }
            for (var i = 0; i < lookupValues.length; i++) {
                var val = lookupValues[i];
                if (val === null || val === undefined) { val = ""; }
                if (matchMode !== 0 && (lookupValues[i] === null || lookupValues[i] === undefined)) {
                    var rowNA = [];
                    for (var q = 0; q < returnColIndices.length; q++) { rowNA.push("#N/A"); }
                    results.push(rowNA);
                    continue;
                }
                var valStr = String(val);
                var row = [];
                if (matchMode === 0) {
                    var matchedRow = index[valStr];
                    if (matchedRow !== undefined) {
                        for (var j = 0; j < returnColIndices.length; j++) {
                            row.push(lookupTable[matchedRow][returnColIndices[j]]);
                        }
                    } else {
                        for (var k = 0; k < returnColIndices.length; k++) { row.push("#N/A"); }
                    }
                } else {
                    var bestRow = -1;
                    for (var m = 0; m < lookupTable.length; m++) {
                        var tableVal = lookupTable[m][matchColIndex];
                        if (tableVal === null || tableVal === undefined) continue;
                        if (Number(tableVal) <= Number(val)) { bestRow = m; }
                        else { break; }
                    }
                    if (bestRow >= 0) {
                        for (var n = 0; n < returnColIndices.length; n++) {
                            row.push(lookupTable[bestRow][returnColIndices[n]]);
                        }
                    } else {
                        for (var p = 0; p < returnColIndices.length; p++) { row.push("#N/A"); }
                    }
                }
                results.push(row);
            }
            return results;
        }
