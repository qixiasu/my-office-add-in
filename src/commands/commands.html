<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Register function commands immediately after office.js loads, before polyfills -->
    <script type="text/javascript">
        // Signal that the function file is ready to initialize
        Office.onReady(function (info) {
            // Office.js is ready
        });

        // Inline utility functions (self-contained, no module dependencies)
        function getColumnLetter(colIndex) {
            var letter = "";
            var remaining = colIndex;
            do {
                letter = String.fromCharCode(65 + (remaining % 26)) + letter;
                remaining = Math.floor(remaining / 26) - 1;
            } while (remaining >= 0);
            return letter;
        }

        function escapeFormulaText(text) {
            return text.replace(/"/g, '""');
        }

        function getColNum(id) {
            var num = 0;
            for (var i = 0; i < id.length; i++) {
                var ch = id.charCodeAt(i);
                if (ch >= 65 && ch <= 90) {
                    num = num * 26 + (ch - 65);
                } else {
                    break;
                }
            }
            return num;
        }

        function getRowNum(id) {
            return parseInt(id.replace(/[^0-9]/g, ""), 10) || 1;
        }

        function buildConcatFormula(firstColLetter, secondColLetter, connector) {
            var escaped = escapeFormulaText(connector);
            return "=IF(" + firstColLetter + "1&" + secondColLetter + '1="","",' +
                firstColLetter + '1&"' + escaped + '"&' + secondColLetter + "1)";
        }

        var MAX_ROWS = 1050000;

        // Core concat logic, extracted so it can be called with a user-provided connector
        function performConcat(event, connector) {
            Excel.run(function (context) {
                var range = context.workbook.getSelectedRange();
                range.load(["address", "columnCount", "columnIndex"]);
                return context.sync().then(function () {
                    if (range.columnCount < 2) {
                        Office.context.ui.messageBox("请至少选择两列");
                        throw new Error("cancel");
                    }

                    var worksheet = context.workbook.worksheets.getActiveWorksheet();
                    var colIndex = range.columnIndex;
                    var firstColLetter = getColumnLetter(colIndex);
                    var secondColLetter = getColumnLetter(colIndex + 1);

                    var usedInSelection = range.getUsedRange();
                    usedInSelection.load("rowCount");
                    return context.sync().then(function () {
                        var rowCount = usedInSelection.rowCount;

                        if (rowCount === 0) {
                            Office.context.ui.messageBox("没有数据");
                            throw new Error("cancel");
                        }

                        if (rowCount > MAX_ROWS) {
                            Office.context.ui.messageBox(
                                "数据量过大（" + rowCount + " 行），单次最多支持 " + MAX_ROWS + " 行。"
                            );
                            throw new Error("cancel");
                        }

                        var targetColLetter = getColumnLetter(colIndex + 2);
                        worksheet
                            .getRange(targetColLetter + ":" + targetColLetter)
                            .insert(Excel.InsertShiftDirection.right);
                        return context.sync().then(function () {
                            var formula = buildConcatFormula(firstColLetter, secondColLetter, connector);

                            var startCell = worksheet.getRange(targetColLetter + "1");
                            startCell.formulas = [[formula]];
                            return context.sync().then(function () {
                                if (rowCount > 1) {
                                    var fillRange = worksheet.getRange(
                                        targetColLetter + "1:" + targetColLetter + rowCount
                                    );
                                    startCell.autoFill(fillRange, Excel.AutoFillType.fillDefault);
                                    return context.sync();
                                }
                            }).then(function () {
                                Office.context.ui.messageBox(
                                    "完成! 已在第 " + targetColLetter + " 列写入 " + rowCount + " 行公式"
                                );
                            });
                        });
                    });
                });
            }).then(function () {
                event.completed();
            }).catch(function (error) {
                if (error.message !== "cancel") {
                    Office.context.ui.messageBox("操作失败: " + error.message);
                }
                event.completed();
            });
        }

        Office.actions.associate("concatenateColumns", function concatenateColumns(event) {
            var dialogUrl = window.location.origin + "/connector-dialog.html";
            Office.context.ui.displayDialogAsync(
                dialogUrl,
                { height: 30, width: 20, displayInIframe: true },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        // Dialog failed, fallback to default connector
                        performConcat(event, "_");
                        return;
                    }
                    var dialog = asyncResult.value;
                    dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                        dialog.close();
                        var connector = arg.message || "_";
                        performConcat(event, connector);
                    });
                    dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                        // Dialog closed without input, cancel operation
                        event.completed();
                    });
                }
            );
        });

        Office.actions.associate("importCSV", function importCSV(event) {
            var dialogUrl = window.location.origin + "/csv-import-dialog.html";
            Office.context.ui.displayDialogAsync(
                dialogUrl,
                { height: 50, width: 30, displayInIframe: true },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        Office.context.ui.messageBox("无法打开导入对话框");
                        event.completed();
                        return;
                    }
                    var dialog = asyncResult.value;
                    dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                        dialog.close();
                        var msg;
                        try {
                            msg = JSON.parse(arg.message);
                        } catch (e) {
                            Office.context.ui.messageBox("数据解析失败");
                            event.completed();
                            return;
                        }
                        if (msg.type !== "import" || !msg.rows || !msg.rows.length) {
                            event.completed();
                            return;
                        }
                        Excel.run(function (context) {
                            var sheet = context.workbook.worksheets.getActiveWorksheet();
                            var startRange = context.workbook.getSelectedRange();
                            startRange.load("address");
                            return context.sync().then(function () {
                                var addr = startRange.address.split("!").pop();
                                var startCol = getColNum(addr);
                                var startRow = getRowNum(addr);
                                var colCount = msg.rows[0].length;
                                var rowCount = msg.rows.length;
                                var endCol = startCol + colCount - 1;
                                var endRow = startRow + rowCount - 1;

                                var targetRange = sheet.getRange(
                                    getColumnLetter(startCol) + startRow + ":" +
                                    getColumnLetter(endCol) + endRow
                                );
                                targetRange.values = msg.rows;
                                return context.sync().then(function () {
                                    Office.context.ui.messageBox(
                                        "导入完成! " + msg.filename + " → " + rowCount + " 行 × " + colCount + " 列"
                                    );
                                });
                            });
                        }).catch(function (error) {
                            Office.context.ui.messageBox("导入失败: " + error.message);
                        }).then(function () {
                            event.completed();
                        });
                    });
                    dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                        event.completed();
                    });
                }
            );
        });

        Office.actions.associate("enhancedVlookup", function enhancedVlookup(event) {
            var dialogUrl = window.location.origin + "/vlookup-dialog.html";
            Office.context.ui.displayDialogAsync(
                dialogUrl,
                { height: 60, width: 35, displayInIframe: true },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        Office.context.ui.messageBox("无法打开增强查找对话框");
                        event.completed();
                        return;
                    }
                    var dialog = asyncResult.value;
                    dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
                        dialog.close();
                        var config;
                        try {
                            config = JSON.parse(arg.message);
                        } catch (e) {
                            event.completed();
                            return;
                        }
                        if (config.type !== "vlookup") {
                            event.completed();
                            return;
                        }
                        performEnhancedVlookup(event, config);
                    });
                    dialog.addEventHandler(Office.EventType.DialogEventReceived, function () {
                        event.completed();
                    });
                }
            );
        });

        function performEnhancedVlookup(event, config) {
            Excel.run(function (context) {
                var selectedRange = context.workbook.getSelectedRange();
                selectedRange.load(["address", "columnCount", "rowCount", "columnIndex", "rowIndex"]);
                return context.sync().then(function () {
                    if (selectedRange.rowCount === 0) {
                        Office.context.ui.messageBox("没有数据");
                        throw new Error("cancel");
                    }

                    if (selectedRange.rowCount > MAX_ROWS) {
                        Office.context.ui.messageBox(
                            "数据量过大（" + selectedRange.rowCount + " 行），单次最多支持 " + MAX_ROWS + " 行。"
                        );
                        throw new Error("cancel");
                    }

                    var worksheet = context.workbook.worksheets.getActiveWorksheet();
                    var dataStartCol = selectedRange.columnIndex;
                    var dataStartRow = selectedRange.rowIndex;
                    var dataRowCount = selectedRange.rowCount;
                    var dataColLetter = getColumnLetter(dataStartCol);

                    var lookupColRange = buildColRangeInline(config.parsed, config.matchColIndex);
                    var returnColRanges = [];
                    for (var i = 0; i < config.returnColIndices.length; i++) {
                        returnColRanges.push(buildColRangeInline(config.parsed, config.returnColIndices[i]));
                    }

                    if (config.outputType === "formula") {
                        var returnColCount = config.returnColIndices.length;
                        var insertPos = dataStartCol + selectedRange.columnCount;

                        for (var c = 0; c < returnColCount; c++) {
                            worksheet
                                .getRange(getColumnLetter(insertPos) + ":" + getColumnLetter(insertPos))
                                .insert(Excel.InsertShiftDirection.right);
                        }

                        return context.sync().then(function () {
                            for (var r = 0; r < returnColCount; r++) {
                                var formulaCol = getColumnLetter(insertPos + r);
                                var lookupCellRef = dataColLetter + dataStartRow;
                                var formula = "=INDEX(" + returnColRanges[r] + ", MATCH(" + lookupCellRef + ", " + lookupColRange + ", " + config.matchMode + "))";

                                var startCell = worksheet.getRange(formulaCol + dataStartRow);
                                startCell.formulas = [[formula]];

                                if (dataRowCount > 1) {
                                    var fillRange = worksheet.getRange(
                                        formulaCol + dataStartRow + ":" + formulaCol + (dataStartRow + dataRowCount - 1)
                                    );
                                    startCell.autoFill(fillRange, Excel.AutoFillType.fillDefault);
                                }
                            }
                            return context.sync().then(function () {
                                Office.context.ui.messageBox(
                                    "完成! 已在 " + returnColCount + " 列写入 " + dataRowCount + " 行 INDEX/MATCH 公式"
                                );
                            });
                        });
                    } else {
                        var dataRange = selectedRange.getUsedRange();
                        dataRange.load("values");
                        return context.sync().then(function () {
                            var dataValues = dataRange.values;
                            var lookupValues = [];
                            for (var r2 = 0; r2 < dataValues.length; r2++) {
                                lookupValues.push(dataValues[r2][0]);
                            }

                            var results = staticLookupInline(
                                lookupValues,
                                config.lookupTable,
                                config.matchColIndex,
                                config.returnColIndices,
                                config.matchMode
                            );

                            var returnColCount2 = config.returnColIndices.length;
                            var insertPos2 = dataStartCol + selectedRange.columnCount;

                            for (var c2 = 0; c2 < returnColCount2; c2++) {
                                worksheet
                                    .getRange(getColumnLetter(insertPos2) + ":" + getColumnLetter(insertPos2))
                                    .insert(Excel.InsertShiftDirection.right);
                            }

                            return context.sync().then(function () {
                                var targetRange = worksheet.getRange(
                                    getColumnLetter(insertPos2) + dataStartRow + ":" +
                                    getColumnLetter(insertPos2 + returnColCount2 - 1) + (dataStartRow + results.length - 1)
                                );
                                targetRange.values = results;
                                return context.sync().then(function () {
                                    Office.context.ui.messageBox(
                                        "完成! 已写入 " + results.length + " 行 × " + returnColCount2 + " 列静态值"
                                    );
                                });
                            });
                        });
                    }
                });
            }).then(function () {
                event.completed();
            }).catch(function (error) {
                if (error.message !== "cancel") {
                    Office.context.ui.messageBox("操作失败: " + error.message);
                }
                event.completed();
            });
        }

        function buildColRangeInline(parsed, colIndex) {
            var colLetter = getColumnLetter(parsed.startCol + colIndex);
            var prefix = parsed.sheet ? parsed.sheet + "!" : "";
            return prefix + "$" + colLetter + "$" + parsed.startRow + ":" + "$" + colLetter + "$" + parsed.endRow;
        }

        function staticLookupInline(lookupValues, lookupTable, matchColIndex, returnColIndices, matchMode) {
            var results = [];
            var index = {};
            if (matchMode === 0) {
                for (var r = 0; r < lookupTable.length; r++) {
                    var key = lookupTable[r][matchColIndex];
                    if (key === null || key === undefined) { key = ""; }
                    key = String(key);
                    index[key] = r;
                }
            }
            for (var i = 0; i < lookupValues.length; i++) {
                var val = lookupValues[i];
                if (val === null || val === undefined) { val = ""; }
                if (matchMode !== 0 && (lookupValues[i] === null || lookupValues[i] === undefined)) {
                    var rowNA = [];
                    for (var q = 0; q < returnColIndices.length; q++) { rowNA.push("#N/A"); }
                    results.push(rowNA);
                    continue;
                }
                var valStr = String(val);
                var row = [];
                if (matchMode === 0) {
                    var matchedRow = index[valStr];
                    if (matchedRow !== undefined) {
                        for (var j = 0; j < returnColIndices.length; j++) {
                            row.push(lookupTable[matchedRow][returnColIndices[j]]);
                        }
                    } else {
                        for (var k = 0; k < returnColIndices.length; k++) { row.push("#N/A"); }
                    }
                } else {
                    var bestRow = -1;
                    for (var m = 0; m < lookupTable.length; m++) {
                        var tableVal = lookupTable[m][matchColIndex];
                        if (tableVal === null || tableVal === undefined) continue;
                        if (Number(tableVal) <= Number(val)) { bestRow = m; }
                        else { break; }
                    }
                    if (bestRow >= 0) {
                        for (var n = 0; n < returnColIndices.length; n++) {
                            row.push(lookupTable[bestRow][returnColIndices[n]]);
                        }
                    } else {
                        for (var p = 0; p < returnColIndices.length; p++) { row.push("#N/A"); }
                    }
                }
                results.push(row);
            }
            return results;
        }

    </script>
