<!-- Connector input dialog for ribbon button -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            padding: 20px;
            margin: 0;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .buttons {
            margin-top: 16px;
            text-align: right;
        }
        button {
            padding: 6px 20px;
            cursor: pointer;
        }
        #okBtn {
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <label for="connector">请输入连接符:</label>
    <input type="text" id="connector" value="_" autofocus />
    <div class="buttons">
        <button id="cancelBtn">取消</button>
        <button id="okBtn">确定</button>
    </div>
    <script type="text/javascript">
        Office.onReady(function () {
            document.getElementById("okBtn").onclick = function () {
                var value = document.getElementById("connector").value || "_";
                Office.context.ui.messageParent(value);
            };
            document.getElementById("cancelBtn").onclick = function () {
                Office.context.ui.messageParent("");
            };
        });
    </script>
</body>
</html>
