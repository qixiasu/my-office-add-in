<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 助手</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/><link href="1fda685b81e1123773f6.css" rel="stylesheet"/><link href="32c57abf71f529a7d779.css" rel="stylesheet"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="ai-assistant-taskpane.js"></script></head><body class="ms-font-m ms-welcome ms-Fabric"><div class="ai-container"><div class="ai-header"><div class="ai-header-title"><span class="ai-header-icon">🤖</span> <span>AI 助手</span></div><button id="settingsBtn" class="ai-icon-btn" title="设置">⚙️</button></div><div id="chatMessages" class="ai-chat-messages"><div class="ai-message ai-message-assistant"><div class="ai-message-content">👋 你好！我是 AI 助手。选中 Excel 中的数据后，告诉我你想做什么。</div></div></div><div id="statusBar" class="ai-status-bar ai-status-idle"><span id="selectionInfo">未选中数据</span> <button id="refreshSelectionBtn" class="ai-status-btn" title="重新获取当前选区">↻</button> <span id="statusText"></span></div><div class="ai-input-area"><textarea id="userInput" class="ai-input" rows="2" placeholder="输入指令...（Enter 发送，Shift+Enter 换行）"></textarea> <button id="sendBtn" class="ai-send-btn" disabled="disabled">发送</button></div><div id="settingsModal" class="ai-modal" style="display:none"><div class="ai-modal-content"><div class="ai-modal-header"><span>⚙️ 设置</span> <button id="closeSettingsBtn" class="ai-icon-btn">✕</button></div><div class="ai-modal-body"><div class="ai-form-group"><label for="apiKeyInput" class="ai-label">DeepSeek API Key</label> <input type="password" id="apiKeyInput" class="ai-form-input" placeholder="sk-..."/></div><div class="ai-form-group"><label for="modelSelect" class="ai-label">模型</label> <select id="modelSelect" class="ai-form-input"><option value="deepseek-v4-flash">deepseek-v4-flash</option><option value="deepseek-v4-pro">deepseek-v4-pro</option></select></div><div class="ai-form-group"><label for="temperatureInput" class="ai-label">温度 (0-1)</label> <input type="number" id="temperatureInput" class="ai-form-input" value="0.3" min="0" max="1" step="0.1"/></div></div><div class="ai-modal-footer"><button id="saveSettingsBtn" class="concat-button concat-button--small">保存</button></div></div></div><div id="confirmBox" class="confirm-box" style="display:none"><div id="confirmMsg" class="confirm-msg"></div><div class="confirm-buttons"><button id="confirmYes" class="concat-button concat-button--small">确定</button> <button id="confirmNo" class="concat-button concat-button--small concat-button--secondary">取消</button></div></div></div></body></html>
